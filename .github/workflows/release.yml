name: Release
on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6

      - name: Extract version from tag
        id: version
        run: echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Validate version format
        run: |
          if ! echo "${{ steps.version.outputs.value }}" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Tag must be semver (e.g. v1.2.3)"
            exit 1
          fi

      - name: Run pre-release quality checks
        run: |
          uv run ruff check custom_components/ tests/
          uv run ruff format --check custom_components/ tests/
          uv run coverage run -m pytest tests/ -v --tb=short
          uv run coverage report --include="custom_components/govee_ble_lights/*" --fail-under=90

      - name: Stamp version into manifest.json
        run: |
          python3 -c "
          import json, pathlib
          p = pathlib.Path('custom_components/govee_ble_lights/manifest.json')
          data = json.loads(p.read_text())
          data['version'] = '${{ steps.version.outputs.value }}'
          p.write_text(json.dumps(data, indent=4) + '\n')
          "

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
