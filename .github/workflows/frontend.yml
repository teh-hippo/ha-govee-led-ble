name: Frontend

on:
  push:
    branches: [master]
    paths:
      - "frontend/**"
      - "custom_components/ha_govee_led_ble/www/**"
      - ".github/workflows/frontend.yml"
  pull_request:
    branches: [master]
    paths:
      - "frontend/**"
      - "custom_components/ha_govee_led_ble/www/**"
      - ".github/workflows/frontend.yml"
  workflow_dispatch:

concurrency:
  group: frontend-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  frontend-unit:
    name: Frontend Unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          # Pinned to the version used locally so the minified card bundle is
          # byte-reproducible for the freshness check below.
          bun-version: "1.3.14"
      - run: bun install --frozen-lockfile
        working-directory: frontend
      - run: bun run typecheck
        working-directory: frontend
      - run: bun run test
        working-directory: frontend
      - run: bun run build
        working-directory: frontend
      - name: Verify committed card bundle is fresh
        run: |
          dist="frontend/dist/govee-led-ble-card.js"
          bundle="custom_components/ha_govee_led_ble/www/govee-led-ble-card.js"
          if ! cmp -s "$dist" "$bundle"; then
            echo "::error::Committed card bundle is stale — rebuild and commit it."
            echo "Run 'bash scripts/check-frontend.sh' locally, then commit:"
            echo "  cp $dist $bundle"
            diff "$dist" "$bundle" || true
            exit 1
          fi
          echo "Committed bundle matches the fresh build."
