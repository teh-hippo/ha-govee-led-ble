version: 2

updates:
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "daily"
    groups:
      python-deps:
        patterns: ["*"]
        exclude-patterns: ["coverage", "pytest"]
        update-types: ["minor", "patch"]
    ignore:
      - dependency-name: "coverage"
        update-types: ["version-update:semver-minor", "version-update:semver-major"]
      - dependency-name: "pytest"
        update-types: ["version-update:semver-minor", "version-update:semver-major"]
    commit-message:
      prefix: "build"
      include: "scope"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
    groups:
      github-actions:
        patterns: ["*"]
        update-types: ["minor", "patch"]
    commit-message:
      prefix: "build"
      include: "scope"
